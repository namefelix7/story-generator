<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事工坊 | Story Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="paper-texture"></div>
    
    <main class="container">
        <header class="header">
            <h1 class="title">故事工坊</h1>
            <p class="subtitle">填写人物信息，让 AI 为你编织独特的故事</p>
        </header>

        <form id="storyForm" class="form">
            <section class="form-section">
                <h2 class="section-title">人物画像</h2>
                
                <div class="field-group">
                    <label class="field-label" for="name">姓名</label>
                    <input type="text" id="name" name="name" class="field-input" placeholder="主角的名字..." required>
                </div>

                <div class="field-row">
                    <div class="field-group">
                        <label class="field-label" for="age">年龄</label>
                        <input type="number" id="age" name="age" class="field-input" placeholder="25" min="1" max="150">
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="occupation">职业</label>
                        <input type="text" id="occupation" name="occupation" class="field-input" placeholder="程序员、作家、探险家...">
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="personality">性格特点</label>
                    <textarea id="personality" name="personality" class="field-textarea" placeholder="描述主角的性格：内向、勇敢、幽默、敏感..."></textarea>
                </div>
            </section>

            <section class="form-section">
                <h2 class="section-title">状态与精力</h2>
                
                <div class="field-group">
                    <label class="field-label">当前精力值</label>
                    <div class="energy-slider">
                        <span class="energy-label low">疲惫</span>
                        <input type="range" id="energy" name="energy" class="slider" min="1" max="100" value="50">
                        <span class="energy-label high">充沛</span>
                    </div>
                    <div class="energy-value"><span id="energyValue">50</span>%</div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="mood">当前心境</label>
                    <select id="mood" name="mood" class="field-select">
                        <option value="">选择当前状态...</option>
                        <option value="calm">平静安详</option>
                        <option value="anxious">焦虑不安</option>
                        <option value="excited">兴奋期待</option>
                        <option value="melancholy">忧郁沉思</option>
                        <option value="hopeful">充满希望</option>
                        <option value="confused">迷茫困惑</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label" for="currentSituation">当前处境</label>
                    <textarea id="currentSituation" name="currentSituation" class="field-textarea" placeholder="主角现在面临什么情况？刚失恋、升职、搬家、创业..."></textarea>
                </div>
            </section>

            <section class="form-section">
                <h2 class="section-title">故事设定</h2>
                
                <div class="field-group">
                    <label class="field-label" for="genre">故事类型</label>
                    <select id="genre" name="genre" class="field-select">
                        <option value="">选择故事类型...</option>
                        <option value="drama">生活剧</option>
                        <option value="romance">爱情故事</option>
                        <option value="adventure">冒险旅程</option>
                        <option value="mystery">悬疑推理</option>
                        <option value="fantasy">奇幻故事</option>
                        <option value="scifi">科幻故事</option>
                        <option value="comedy">轻喜剧</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label" for="additionalInfo">额外信息</label>
                    <textarea id="additionalInfo" name="additionalInfo" class="field-textarea" placeholder="任何你想加入的元素：特定场景、配角、情节要求..."></textarea>
                </div>
            </section>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">生成故事脚本</span>
                <span class="btn-loading" style="display: none;">
                    <span class="spinner"></span>
                    创作中...
                </span>
            </button>
        </form>

        <section class="result-section" id="resultSection" style="display: none;">
            <h2 class="result-title">✨ 你的故事脚本</h2>
            <div class="story-output" id="storyOutput"></div>
            <button class="copy-btn" id="copyBtn">复制故事</button>
        </section>
    </main>

    <footer class="footer">
        <p>Powered by DeepSeek AI • Created with ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
